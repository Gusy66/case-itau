services:
  postgres:
    image: postgres:16-alpine
    container_name: case-itau-postgres
    environment:
      POSTGRES_DB: renegdb
      POSTGRES_USER: reneg
      POSTGRES_PASSWORD: reneg
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reneg -d renegdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: case-itau-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
